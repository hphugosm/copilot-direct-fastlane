<!doctype html>
<html lang="cs">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Galerie | Olomouc</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <header class="site-header">
      <div class="shell header-inner">
        <a class="brand" href="./index.html">Olomouc</a>
        <nav class="site-nav" aria-label="Hlavní navigace">
          <a href="./index.html">Domů</a>
          <a href="./pamatky.html">Památky</a>
          <a href="./zajimavosti.html">Zajímavosti</a>
          <a class="is-active" href="./galerie.html">Galerie</a>
          <a href="./faq.html">FAQ</a>
          <a href="./sources.html">Sources</a>
        </nav>
      </div>
    </header>

    <main class="shell page-top">
      <p class="eyebrow">Galerie</p>
      <h1>Skutečné fotky Olomouce uložené lokálně v projektu.</h1>
      <p class="lead">
        Všechny snímky jsou stažené z Wikimedia Commons a uložené do repa. Žádný hotlink jako
        finální řešení.
      </p>

      <section class="gallery-grid">
        <figure class="photo-card">
          <img src="assets/images/olomouc-panorama.jpg" alt="Olomouc shora s historickým jádrem v centru" />
          <figcaption>
            <strong>Panorama města</strong>
            <span>Adamsrockmetal / CC BY-SA 3.0</span>
          </figcaption>
        </figure>

        <figure class="photo-card">
          <img src="assets/images/horni-namesti.jpg" alt="Horní náměstí v Olomouci s radnicí a okolními domy" />
          <figcaption>
            <strong>Horní náměstí</strong>
            <span>Dominik Tefert / public domain derivative on Commons</span>
          </figcaption>
        </figure>

        <figure class="photo-card">
          <img src="assets/images/katedrala-sv-vaclava.jpg" alt="Katedrála svatého Václava v Olomouci" />
          <figcaption>
            <strong>Katedrála sv. Václava</strong>
            <span>xkomczax / CC BY 3.0</span>
          </figcaption>
        </figure>

        <figure class="photo-card">
          <img src="assets/images/orloj.jpg" alt="Olomoucký orloj na budově radnice" />
          <figcaption>
            <strong>Olomoucký orloj</strong>
            <span>Diligent / CC BY-SA 2.5</span>
          </figcaption>
        </figure>

        <figure class="photo-card photo-card-wide">
          <img src="assets/images/sloup-nejsvetejsi-trojice.jpg" alt="Vrchol Sloupu Nejsvětější Trojice v Olomouci" />
          <figcaption>
            <strong>Sloup Nejsvětější Trojice</strong>
            <span>Jan Kameníček / public domain</span>
          </figcaption>
        </figure>
      </section>
    </main>

    <footer class="site-footer shell">
      <p>Galerie je postavená na lokálních kopiích reálných Commons fotek.</p>
    </footer>
  </body>
</html>
