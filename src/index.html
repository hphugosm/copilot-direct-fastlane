<!doctype html>
<html lang="cs">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Copilot Direct Fastlane</title>
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <main class="container">
      <h1>Copilot Direct Fastlane MVP</h1>
      <p>Minimalni single-page demo s jednoduchym Supabase read/write.</p>

      <section class="card">
        <h2>Pridat zaznam</h2>
        <form id="item-form">
          <input id="item-input" name="text" placeholder="Napis kratky zaznam" required maxlength="140" />
          <button type="submit">Ulozit</button>
        </form>
        <p id="status"></p>
      </section>

      <section class="card">
        <h2>Posledni zaznamy</h2>
        <ul id="items"></ul>
      </section>
    </main>

    <script type="module" src="./main.js"></script>
  </body>
</html>
